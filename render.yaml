services:
  # Backend
  - type: web
    name: telemedicine-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: telemedicine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false

  # Frontend
  - type: web
    name: telemedicine-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: telemedicine-backend
          property: host
        transformation: "https://${value}/api"
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: telemedicine-backend
          property: host
        transformation: "https://${value}"

databases:
  - name: telemedicine-db
    plan: free
